<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📱 ИГРИЩЕ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #a78bfa; --bg-mid: #c084fc; --bg-end: #f9a8d4;
            --card-bg: rgba(255,255,255,0.55); --card-border: rgba(255,255,255,0.5);
            --text: #2d1b69; --accent: #7c3aed; --accent2: #f472b6;
            --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
            --shadow: 0 8px 40px rgba(124,58,237,0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Nunito', sans-serif; font-weight: 800;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 16px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; width: 300px; height: 300px;
            background: rgba(255,255,255,0.3); border-radius: 50%; filter: blur(80px);
            top: -50px; right: -50px; animation: float1 8s infinite; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; width: 250px; height: 250px;
            background: rgba(255,255,255,0.25); border-radius: 50%; filter: blur(60px);
            bottom: -30px; left: -30px; animation: float2 10s infinite; z-index: 0;
        }
        @keyframes float1 {
            0%,100%{transform:translate(0,0) scale(1);}
            50%{transform:translate(-30px,40px) scale(1.2);}
        }
        @keyframes float2 {
            0%,100%{transform:translate(0,0) scale(1);}
            50%{transform:translate(40px,-20px) scale(1.15);}
        }
        .container { position: relative; z-index: 1; width: 100%; max-width: 400px; }
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid var(--card-border); border-radius: 32px;
            padding: 36px 24px; box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
            animation: cardIn 0.6s ease;
        }
        @keyframes cardIn {
            from{opacity:0;transform:translateY(40px) scale(0.92);}
            to{opacity:1;transform:translateY(0) scale(1);}
        }
        .logo {
            font-size: 48px; font-weight: 900; text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: -1px; margin-bottom: 28px;
        }
        .input-group { margin-bottom: 18px; }
        .input-label {
            font-size: 13px; font-weight: 700; color: var(--text); opacity: 0.6;
            margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase;
        }
        .glass-input {
            width: 100%; padding: 18px 22px; font-family: 'Nunito', sans-serif;
            font-weight: 800; font-size: 22px; background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.6);
            border-radius: 20px; color: var(--text); text-align: center; outline: none;
            transition: all 0.3s;
        }
        .glass-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.95); transform: scale(1.02); }
        #codeInput { letter-spacing: 10px; text-transform: uppercase; font-size: 26px; }
        .btn {
            width: 100%; padding: 18px; font-family: 'Nunito', sans-serif;
            font-weight: 900; font-size: 22px; letter-spacing: 2px; border: none;
            border-radius: 50px; cursor: pointer; color: white;
            background: linear-gradient(135deg, var(--accent), #a855f7, var(--accent2));
            box-shadow: 0 8px 32px rgba(124,58,237,0.5);
            margin-top: 12px; transition: all 0.3s;
        }
        .btn:active { transform: scale(0.94); }
        .player-header { text-align: center; margin-bottom: 20px; }
        .player-name { font-size: 28px; font-weight: 900; color: var(--text); }
        .score-label { font-size: 12px; opacity: 0.5; letter-spacing: 3px; text-transform: uppercase; }
        .player-score {
            font-size: 56px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 4px 0; transition: transform 0.3s;
        }
        .error-msg { color: var(--red); text-align: center; margin-top: 14px; font-size: 14px; font-weight: 700; min-height: 22px; }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0; }
        .answer-btn {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            border: 3px solid rgba(255,255,255,0.6); border-radius: 20px;
            padding: 22px 10px; font-family: 'Nunito', sans-serif; font-weight: 800;
            font-size: 15px; cursor: pointer; text-align: center; transition: all 0.2s;
            color: var(--text); word-break: break-word;
        }
        .answer-btn:active:not(:disabled) { border-color: var(--accent); background: rgba(124,58,237,0.12); transform: scale(0.94); }
        .answer-btn:disabled {
            cursor: not-allowed; opacity: 0.45; filter: grayscale(40%);
            pointer-events: none;
        }
        .answer-btn.selected-answer {
            opacity: 1 !important; filter: none !important;
            transform: scale(1.03); border-width: 4px;
        }
        .answer-btn.correct-choice { border-color: var(--green) !important; background: rgba(34,197,94,0.2) !important; }
        .answer-btn.wrong-choice { border-color: var(--red) !important; background: rgba(239,68,68,0.2) !important; }
        
        .timer {
            text-align: center; font-size: 42px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 12px 0;
        }
        .timer.warning {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: timerPulse 0.5s infinite;
        }
        @keyframes timerPulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.1);opacity:0.6;} }
        .hidden { display: none !important; }
        .waiting-icon { font-size: 56px; display: block; margin-bottom: 12px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-15px);} }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 30px; font-size: 14px; font-weight: 800; margin-top: 10px; }
        .status-correct { background: rgba(34,197,94,0.2); color: #16a34a; }
        .status-wrong { background: rgba(239,68,68,0.2); color: #dc2626; }
        .question-text { text-align: center; font-size: 19px; font-weight: 800; margin: 14px 0; line-height: 1.5; color: var(--text); }
    </style>
</head>
<body>
    <div class="container">
        <div id="joinScreen">
            <div class="glass-card">
                <div class="logo">ИГРИЩЕ</div>
                <div class="input-group"><div class="input-label">Имя</div><input class="glass-input" type="text" id="nameInput" placeholder="Твоё имя" maxlength="15" autocomplete="off"></div>
                <div class="input-group"><div class="input-label">Код</div><input class="glass-input" type="text" id="codeInput" placeholder="ABCD" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters"></div>
                <button class="btn" onclick="joinGame()">ВОЙТИ</button>
                <div class="error-msg" id="errorMsg"></div>
            </div>
        </div>
        <div id="gameScreen" class="hidden">
            <div class="glass-card">
                <div class="player-header"><div class="player-name" id="playerName">—</div><div class="score-label">очки</div><div class="player-score" id="scoreDisplay">0</div></div>
                <div id="quizArea" class="hidden">
                    <div id="questionArea" class="hidden"><div class="question-text" id="questionText"></div><div class="timer" id="timer"></div><div class="answers-grid" id="answersGrid"></div><div style="text-align:center;" id="answerStatus"></div></div>
                    <div id="waitingArea"><div style="text-align:center;padding:24px 0;"><span class="waiting-icon">📺</span><div style="opacity:0.6;font-weight:700;">Жди вопрос на ТВ!</div></div></div>
                </div>
                <div id="truthDareArea" class="hidden">
                    <div id="votingArea" class="hidden"><div style="text-align:center;font-size:18px;margin-bottom:20px;">Голосуй за <span id="voteTargetName" style="color:var(--accent);"></span>:</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"><button class="answer-btn" onclick="submitVote('truth')" style="font-size:22px;padding:30px;">🗣 Правда</button><button class="answer-btn" onclick="submitVote('dare')" style="font-size:22px;padding:30px;">💥 Действие</button></div></div>
                    <div id="taskArea" class="hidden"><div style="text-align:center;font-size:18px;margin-bottom:15px;">Твоё задание:</div><div id="taskDisplay" style="text-align:center;font-size:22px;font-weight:900;padding:20px;background:rgba(255,255,255,0.5);border-radius:16px;margin-bottom:20px;line-height:1.4;"></div><button class="btn" onclick="taskDone()">✅ ГОТОВО</button></div>
                    <div id="tdWaitingArea"><div style="text-align:center;padding:24px 0;"><span class="waiting-icon">📺</span><div id="tdWaitingText" style="opacity:0.6;font-weight:700;">Смотри на ТВ</div></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let playerId = null, roomCode = null, gameType = null, isCurrentPlayer = false, gameInterval = null, currentTimer = null, hasAnswered = false;
        
        function joinGame() {
            const name = document.getElementById('nameInput').value.trim() || 'Игрок';
            const code = document.getElementById('codeInput').value.toUpperCase();
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';
            if (code.length !== 4) { errorEl.textContent = 'Нужен 4-буквенный код'; return; }
            fetch('/api/join', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,code})})
            .then(r=>r.json()).then(data=>{
                if(data.error){errorEl.textContent=data.error;return;}
                playerId=data.player_id; roomCode=code; gameType=data.game_type||'quiz';
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                document.getElementById('playerName').textContent=data.name;
                checkGameState(); gameInterval=setInterval(checkGameState,1500);
            }).catch(()=>{errorEl.textContent='Сервер не отвечает';});
        }
        
        function checkGameState() {
            if(!roomCode)return;
            fetch('/api/state/'+roomCode).then(r=>r.json()).then(data=>{
                if(data.error)return;
                if(data.scores&&data.scores[playerId]!==undefined) document.getElementById('scoreDisplay').textContent=data.scores[playerId];
                if(data.game_type==='truth_dare') handleTruthDareState(data);
                else if(data.game_type==='quiz') handleQuizState(data);
            });
        }
        
        function submitVote(vote) {
            fetch('/api/vote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,player_id:playerId,vote})})
            .then(()=>{document.getElementById('votingArea').classList.add('hidden');document.getElementById('tdWaitingText').textContent='Твой голос учтён!';document.getElementById('tdWaitingArea').classList.remove('hidden');});
        }
        
        function taskDone() {
            fetch('/api/task_done',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:roomCode,player_id:playerId})})
            .then(()=>{document.getElementById('taskArea').classList.add('hidden');document.getElementById('tdWaitingArea').classList.remove('hidden');document.getElementById('tdWaitingText').textContent='Задание выполнено!';});
        }
        
        function handleTruthDareState(data) {
            document.getElementById('quizArea').classList.add('hidden');
            document.getElementById('truthDareArea').classList.remove('hidden');
            if(data.state==='lobby'){document.getElementById('votingArea').classList.add('hidden');document.getElementById('taskArea').classList.add('hidden');document.getElementById('tdWaitingArea').classList.remove('hidden');document.getElementById('tdWaitingText').textContent='Ожидаем начала...';return;}
            const isMyTurn = data.current_player_id === playerId; isCurrentPlayer = isMyTurn;
            if(data.state==='voting'){document.getElementById('taskArea').classList.add('hidden');if(isMyTurn){document.getElementById('votingArea').classList.add('hidden');document.getElementById('tdWaitingArea').classList.remove('hidden');document.getElementById('tdWaitingText').textContent='Ты выбран! Жди решения...';}else{document.getElementById('votingArea').classList.remove('hidden');document.getElementById('tdWaitingArea').classList.add('hidden');document.getElementById('voteTargetName').textContent=data.current_player_name||'игрока';}}
            else if(data.state==='task'&&data.show_task){document.getElementById('votingArea').classList.add('hidden');if(isMyTurn){document.getElementById('taskArea').classList.remove('hidden');document.getElementById('tdWaitingArea').classList.add('hidden');document.getElementById('taskDisplay').textContent=(data.task_type==='truth'?'🗣 ПРАВДА: ':'💥 ДЕЙСТВИЕ: ')+data.current_task;}else{document.getElementById('taskArea').classList.add('hidden');document.getElementById('tdWaitingArea').classList.remove('hidden');document.getElementById('tdWaitingText').textContent=data.current_player_name+' выполняет задание...';}}
            else if(data.state==='finished'){document.getElementById('votingArea').classList.add('hidden');document.getElementById('taskArea').classList.add('hidden');document.getElementById('tdWaitingArea').classList.remove('hidden');document.getElementById('tdWaitingText').textContent='🏁 Игра окончена!';}
        }
        
        function handleQuizState(data) {
            document.getElementById('truthDareArea').classList.add('hidden');
            document.getElementById('quizArea').classList.remove('hidden');
            if(data.state==='playing'&&data.current_question) showQuestion(data.current_question);
            else { document.getElementById('questionArea').classList.add('hidden'); document.getElementById('waitingArea').classList.remove('hidden'); }
        }
        
        function showQuestion(question) {
            hasAnswered = false;
            document.getElementById('answerStatus').innerHTML = '';
            document.getElementById('questionArea').classList.remove('hidden');
            document.getElementById('waitingArea').classList.add('hidden');
            document.getElementById('questionText').textContent = question.text;

            // Включаем кнопки
            document.getElementById('answersGrid').innerHTML = question.answers
                .map((a, i) => `
                    <button class="answer-btn" onclick="submitAnswer(${i}, this)" 
                            style="opacity:1;pointer-events:auto;border-color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.7);">
                        ${a}
                    </button>
                `).join('');
                
            // Синхронизированный таймер с сервера
            startSyncedTimer();
        }
        
        function startSyncedTimer() {
        const timerEl = document.getElementById('timer');
        clearInterval(currentTimer);

            function updateTimer() {
                if (!roomCode) return;

                fetch('/api/state/' + roomCode)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.current_question) return;

                        const timeLeft = data.question_time_left || 0;

                        if (timeLeft <= 0) {
                            timerEl.textContent = '⏰ Время!';
                            timerEl.classList.add('warning');
                        } else {
                            timerEl.textContent = '⏱ ' + timeLeft;
                            if (timeLeft <= 5) {
                                timerEl.classList.add('warning');
                            } else {
                                timerEl.classList.remove('warning');
                            }
                        }
                    })
                    .catch(() => {});
            }

            updateTimer();
            currentTimer = setInterval(updateTimer, 1000);
        }

        function submitAnswer(answerIndex, button) {
    // 🔒 Блокировка повторных ответов
    if (!roomCode || !playerId || hasAnswered) return;
    hasAnswered = true;
    
    // Блокируем ВСЕ кнопки
    document.querySelectorAll('.answer-btn').forEach(b => {
        b.classList.add('answered');
        b.disabled = true;
        b.style.opacity = '0.45';
        b.style.pointerEvents = 'none';
    });
    
    // Подсвечиваем выбранную
    button.classList.add('selected-answer');
    button.style.opacity = '1';
    
    fetch('/api/answer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({code: roomCode, player_id: playerId, answer: answerIndex})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            // Ошибка — разблокируем
            hasAnswered = false;
            document.querySelectorAll('.answer-btn').forEach(b => {
                b.disabled = false;
                b.style.opacity = '1';
                b.style.pointerEvents = 'auto';
            });
            button.classList.remove('selected-answer');
            return;
        }
        
        if (data.score !== undefined) {
            const scoreEl = document.getElementById('scoreDisplay');
            scoreEl.textContent = data.score;
            scoreEl.style.transform = 'scale(1.3)';
            setTimeout(() => scoreEl.style.transform = 'scale(1)', 200);
        }
        
        if (data.correct) {
            button.classList.add('correct-choice');
            document.getElementById('answerStatus').innerHTML = 
                '<span class="status-badge status-correct">✅ Верно!</span>';
        } else {
            button.classList.add('wrong-choice');
            document.getElementById('answerStatus').innerHTML = 
                '<span class="status-badge status-wrong">❌ Мимо</span>';
        }
        
        // Останавливаем таймер на клиенте
        clearInterval(currentTimer);
        document.getElementById('timer').textContent = '✅ Отправлен';
    });
}
        
        document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')joinGame();});
        document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('codeInput').focus();});
        document.getElementById('nameInput').focus();
    </script>
</body>
</html>
