<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ИГРИЩЕ — ТВ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #a78bfa;
            --bg-mid: #c084fc;
            --bg-end: #f9a8d4;
            --card-bg: rgba(255, 255, 255, 0.55);
            --card-border: rgba(255, 255, 255, 0.5);
            --text: #2d1b69;
            --accent: #7c3aed;
            --accent2: #f472b6;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --shadow: 0 8px 40px rgba(124, 58, 237, 0.2);
            --glow: 0 0 30px rgba(244, 114, 182, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }


        
        body {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%; filter: blur(100px);
            top: -100px; right: -100px;
            animation: float1 10s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 350px; height: 350px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%; filter: blur(80px);
            bottom: -80px; left: -80px;
            animation: float2 12s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-40px, 50px) scale(1.2); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(50px, -30px) scale(1.15); }
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 950px; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 40px;
            margin: 20px 0;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
            animation: cardIn 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            font-size: 80px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 12px rgba(124, 58, 237, 0.4));
        }

        .subtitle {
            text-align: center;
            opacity: 0.6;
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .section-title { text-align: center; font-size: 22px; opacity: 0.7; margin-bottom: 20px; }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin: 30px 0;
        }

        .game-card {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 24px;
            padding: 32px 20px 24px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .game-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(124, 58, 237, 0.25); }
        .game-card.selected {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.08);
            box-shadow: 0 0 0 6px rgba(124, 58, 237, 0.1), var(--glow);
            transform: translateY(-6px);
        }

        .game-icon-wrap {
            width: 80px; height: 80px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 12px;
        }
        .game-icon-img { width: 100%; height: 100%; object-fit: contain; }
        .game-icon-emoji { font-size: 48px; line-height: 1; }
        .game-name { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
        .game-desc { font-size: 14px; opacity: 0.6; }
        .game-badge {
            display: inline-block; margin-top: 12px; padding: 6px 18px;
            background: rgba(124, 58, 237, 0.1); border-radius: 20px;
            font-size: 12px; letter-spacing: 1px;
        }

        /* Код комнаты */
        .room-code {
            display: inline-block;
            font-size: 80px; letter-spacing: 16px; padding: 20px 50px;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 24px;
            color: var(--text);
            box-shadow: var(--shadow), inset 0 2px 4px rgba(255,255,255,0.8);
            animation: codePulse 3s ease-in-out infinite;
        }
        @keyframes codePulse {
            0%, 100% { box-shadow: var(--shadow), inset 0 2px 4px rgba(255,255,255,0.8); }
            50% { box-shadow: var(--glow), 0 0 40px rgba(244, 114, 182, 0.4), inset 0 2px 4px rgba(255,255,255,0.9); }
        }

        .center { text-align: center; }
        .highlight { color: var(--accent); font-weight: 900; }

        /* Игроки в лобби */
        .players-grid {
            display: flex; flex-wrap: wrap; gap: 14px;
            justify-content: center; margin: 30px 0; min-height: 60px;
        }
        .player-card {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 18px;
            padding: 14px 22px; font-size: 18px; font-weight: 800;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .player-emoji { font-size: 22px; margin-right: 6px; }

        /* Кнопки */
        .btn {
            display: inline-block; padding: 16px 50px;
            font-family: 'Nunito', sans-serif; font-weight: 900;
            font-size: 22px; letter-spacing: 2px;
            border: none; border-radius: 50px; cursor: pointer;
            color: white; transition: all 0.3s; margin: 8px;
            position: relative; overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #a855f7, var(--accent2));
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.5), inset 0 2px 0 rgba(255,255,255,0.4);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(124, 58, 237, 0.6); }
        .btn:disabled { background: rgba(255,255,255,0.3); box-shadow: none; cursor: not-allowed; color: rgba(0,0,0,0.2); }
        .btn-secondary {
            background: rgba(255,255,255,0.5); color: var(--text);
            font-size: 16px; padding: 12px 28px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.8); }

        .hidden { display: none !important; }

        /* ====== ИГРОВОЙ ЭКРАН ====== */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 10px;
        }
        .game-header-icon {
            width: 42px; height: 42px;
            object-fit: contain;
            filter: none !important;
        }
        .game-header-emoji { font-size: 36px; }
        .game-header-title { font-size: 28px; font-weight: 900; opacity: 0.8; }

        .question-counter { text-align: center; opacity: 0.5; font-size: 16px; margin-bottom: 15px; letter-spacing: 2px; }

        .question-text {
            font-size: 36px; font-weight: 900; margin-bottom: 24px;
            line-height: 1.3; text-align: center; color: var(--text);
        }

        .answers-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 14px; max-width: 650px; margin: 0 auto;
        }
        .answer-display {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            padding: 22px 18px; border-radius: 20px; font-size: 20px;
            font-weight: 800; border: 2px solid rgba(255,255,255,0.5);
            text-align: center; color: var(--text);
        }

        .timer {
            font-size: 64px; font-weight: 900; text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 20px 0;
            transition: all 0.3s;
        }
        .timer.warning {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerBlink 0.5s infinite;
        }
        .timer.auto-next {
            background: linear-gradient(135deg, var(--green), #4ade80);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerBlink 0.3s infinite;
        }
        @keyframes timerBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.08); }
        }

        /* Статус игроков */
        .players-status {
            display: flex; flex-wrap: wrap; gap: 12px;
            justify-content: center; margin: 20px 0;
        }
        .player-status-card {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 16px; padding: 12px 20px;
            font-size: 18px; font-weight: 800;
            transition: all 0.4s;
        }
        .player-status-card.answered {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.1);
        }
        .player-status-card.not-answered {
            border-color: var(--orange);
            background: rgba(245, 158, 11, 0.05);
        }
        .status-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .status-dot.done { background: var(--green); box-shadow: 0 0 12px rgba(34,197,94,0.5); }
        .status-dot.waiting { background: var(--orange); animation: dotPulse 1s infinite; }
        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .answered-count { font-size: 14px; opacity: 0.6; text-align: center; margin-top: 8px; }

        /* Счёт */
        .scores-list {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin: 20px 0;
        }
        .score-card {
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            padding: 12px 22px; border-radius: 16px;
            text-align: center; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .score-card.top { background: rgba(124, 58, 237, 0.12); border-color: rgba(124, 58, 237, 0.3); }
        .score-name { font-size: 13px; opacity: 0.6; margin-bottom: 4px; }
        .score-value { font-size: 28px; color: var(--accent); }

        /* Финал */
        .winner-crown { font-size: 72px; display: block; margin-bottom: 10px; }
        .winner-name {
            font-size: 44px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .winner-score { font-size: 52px; font-weight: 900; color: var(--accent); }
        .ranking-item {
            display: flex; justify-content: space-between;
            padding: 14px 22px; background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px); border-radius: 14px;
            margin: 8px 0; font-weight: 800; font-size: 18px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .ranking-score { color: var(--accent); font-weight: 900; }
        .empty-state { text-align: center; opacity: 0.4; padding: 24px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- ВЫБОР ИГРЫ -->
        <div id="game-select" class="glass-card">
            <div class="logo">ИГРИЩЕ</div>
            <div class="subtitle">игра для компании</div>
            <div class="section-title">Выбери игру:</div>
            <div class="games-grid" id="gamesList"><div class="empty-state">Загрузка игр...</div></div>
            <div class="center" style="margin-top:24px;">
                <button class="btn btn-primary" id="createRoomBtn" disabled onclick="createRoom()">🚀 СОЗДАТЬ КОМНАТУ</button>
            </div>
        </div>
        
        <!-- ЛОББИ -->
        <div id="lobby" class="glass-card hidden">
            <div class="logo" style="font-size:36px;" id="lobbyGameName"></div>
            <div class="center" style="margin:30px 0;">
                <div class="room-code" id="roomCode">----</div>
                <p style="font-size:22px;margin-top:20px;opacity:0.7;">
                    Заходи на <span class="highlight" id="serverUrl">...</span>
                </p>
            </div>
            <div class="players-grid" id="playersList"><div class="empty-state">Ожидаем игроков...</div></div>
            <div class="center" style="margin-top:30px;">
                <button class="btn btn-primary" id="startBtn" disabled onclick="startGame()">🎮 НАЧАТЬ ИГРУ</button>
                <br><button class="btn btn-secondary" onclick="resetToMenu()">← Выбрать другую игру</button>
            </div>
        </div>
        
        <!-- ИГРА -->
        <div id="game-screen" class="glass-card hidden">
            <!-- Заголовок с иконкой -->
            <div class="game-header">
                <img class="game-header-icon" id="gameIconImg" src="" alt="" style="display:none;">
                <span class="game-header-emoji" id="gameIconEmoji"></span>
                <span class="game-header-title" id="gameTitle"></span>
            </div>
            
            <div class="question-counter" id="questionCounter"></div>
            <div class="question-text" id="questionText"></div>
            <div class="timer" id="timer"></div>
            <div class="answers-grid" id="answersDisplay"></div>
            
            <!-- Статус игроков -->
            <div class="answered-count" id="answeredCount"></div>
            <div class="players-status" id="playersStatus"></div>
            
            <!-- Счёт -->
            <div class="scores-list" id="scoresDisplay"></div>
        </div>
        
        <!-- ФИНАЛ -->
        <div id="finish-screen" class="glass-card hidden">
            <div class="logo" style="font-size:36px;">ИГРА ОКОНЧЕНА!</div>
            <div class="center" style="margin:30px 0;">
                <span class="winner-crown">👑</span>
                <div class="winner-name" id="winnerName"></div>
                <div class="winner-score" id="winnerScore"></div>
            </div>
            <div id="finalRanking" style="max-width:450px;margin:0 auto;"></div>
            <div class="center" style="margin-top:30px;">
                <button class="btn btn-primary" onclick="resetToMenu()">🔄 ИГРАТЬ ЕЩЁ</button>
            </div>
        </div>
        
    </div>

<script>
let selectedGame = null;
let roomCode = null;
let currentTimer = null;
let autoNextTimer = null;
let lobbyInterval = null;
let updateInterval = null;
let lastAnswerCount = 0;
let lastPlayerCount = 0;

// ========== ЗАГРУЗКА ИГР ==========
fetch('/api/games')
    .then(r => r.json())
    .then(games => {
        const grid = document.getElementById('gamesList');
        if (Object.keys(games).length === 0) {
            grid.innerHTML = '<div class="empty-state">Нет доступных игр</div>';
            return;
        }
        grid.innerHTML = Object.entries(games).map(([id, game]) => {
            const hasImage = game.icon_image && game.icon_image.trim() !== '';
            const iconHTML = hasImage 
                ? `<img src="${game.icon_image}" class="game-icon-img" alt="" onerror="this.parentElement.innerHTML='<span class=\\'game-icon-emoji\\'>${game.icon || '🎮'}</span>'">`
                : `<span class="game-icon-emoji">${game.icon || '🎮'}</span>`;
            return `
                <div class="game-card" data-game="${id}" onclick="selectGame('${id}')">
                    <div class="game-icon-wrap">${iconHTML}</div>
                    <div class="game-name" style="color:${game.color}">${game.name}</div>
                    <div class="game-desc">${game.description}</div>
                    <div class="game-badge">${game.questions_count} вопросов</div>
                </div>`;
        }).join('');
    });

function selectGame(id) {
    selectedGame = id;
    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`[data-game="${id}"]`).classList.add('selected');
    document.getElementById('createRoomBtn').disabled = false;
}

function createRoom() {
    if (!selectedGame) return;
    fetch(`/api/create?game=${selectedGame}`)
        .then(r => r.json())
        .then(data => {
            roomCode = data.code;
            document.getElementById('game-select').classList.add('hidden');
            document.getElementById('lobby').classList.remove('hidden');
            document.getElementById('lobbyGameName').textContent = data.game.name;
            document.getElementById('roomCode').textContent = roomCode;
            document.getElementById('serverUrl').textContent = window.location.host + '/player';
            lastPlayerCount = 0;
            updateLobby();
            lobbyInterval = setInterval(updateLobby, 2000);
        });
}

function updateLobby() {
    if (!roomCode) return;
    fetch('/api/state/' + roomCode)
        .then(r => r.json())
        .then(data => {
            if (data.error) return;
            const players = data.players || {};
            const count = Object.keys(players).length;
            
            // Звук при новом игроке
            if (count > lastPlayerCount && lastPlayerCount > 0) {
                playPlayerJoin();
            }
            lastPlayerCount = count;
            
            const emojis = ['🦊','🐼','🐨','🦁','🐸','🦄','🐙','🦋'];
            document.getElementById('playersList').innerHTML = count === 0 
                ? '<div class="empty-state">Ожидаем игроков...</div>'
                : Object.entries(players).map(([id,p],i) => 
                    `<div class="player-card"><span class="player-emoji">${emojis[i%8]}</span>${p.name}</div>`).join('');
            document.getElementById('startBtn').disabled = count === 0;
            if (data.state === 'playing') { clearInterval(lobbyInterval); showGameScreen(data); }
        });
}

function startGame() {
    playGameStart();
    fetch('/api/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:roomCode})});
}

function showGameScreen(data) {
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    
    if (data.game_icon_image) {
        document.getElementById('gameIconImg').src = data.game_icon_image;
        document.getElementById('gameIconImg').style.display = 'inline-block';
        document.getElementById('gameIconEmoji').style.display = 'none';
    } else {
        document.getElementById('gameIconImg').style.display = 'none';
        document.getElementById('gameIconEmoji').textContent = data.game_icon || '🎮';
        document.getElementById('gameIconEmoji').style.display = 'inline-block';
    }
    document.getElementById('gameTitle').textContent = data.game_name || '';
    
    lastAnswerCount = 0;
    showQuestion();
    updateInterval = setInterval(updateGameState, 1000);
}

function updateGameState() {
    if (!roomCode) return;
    fetch('/api/state/' + roomCode)
        .then(r => r.json())
        .then(data => {
            if (data.error) return;
            if (data.state === 'finished') {
                clearInterval(updateInterval);
                showFinalScreen(data);
                return;
            }
            
            // Звук при новых ответах
            const newCount = data.answers_count || 0;
            if (newCount > lastAnswerCount) {
                playCorrect();
            }
            lastAnswerCount = newCount;
            
            updatePlayerStatus(data);
            updateScores(data);
        });
}

function showQuestion() {
    fetch('/api/state/' + roomCode)
        .then(r => r.json())
        .then(data => {
            if (data.state === 'finished') { showFinalScreen(data); return; }
            
            const q = data.current_question;
            if (!q) return;
            
            document.getElementById('questionCounter').textContent = 
                `Вопрос ${data.question_index + 1} из ${data.total_questions}`;
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('answersDisplay').innerHTML = q.answers
                .map((a, i) => `<div class="answer-display">${a}</div>`).join('');
            
            // Таймер запускается ПОСЛЕ получения данного с сервера
            const timeLeft = data.question_time_left || q.time || 30;
            const timerEl = document.getElementById('timer');
            timerEl.classList.remove('warning', 'auto-next');
            clearInterval(currentTimer);
            clearTimeout(autoNextTimer);
            
            let remaining = timeLeft;
            timerEl.textContent = '⏱ ' + remaining;
            
            currentTimer = setInterval(() => {
                remaining--;
                timerEl.textContent = '⏱ ' + remaining;
                if (remaining <= 5) timerEl.classList.add('warning');
                if (remaining <= 0) {
                    clearInterval(currentTimer);
                    timerEl.textContent = '⏰ 0';
                    autoNext();
                }
            }, 1000);
            
            autoNextTimer = setTimeout(autoNext, (timeLeft + 3) * 1000);
            
            updatePlayerStatus(data);
            updateScores(data);
        });
}

function autoNext() {
    playAutoNext();
    clearInterval(currentTimer);
    clearTimeout(autoNextTimer);
    
    const timerEl = document.getElementById('timer');
    timerEl.textContent = '→ Дальше...';
    timerEl.classList.add('auto-next');
    
    setTimeout(() => {
        fetch('/api/next', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: roomCode})
        })
        .then(() => {
            lastAnswerCount = 0;
            timerEl.classList.remove('auto-next');
            showQuestion();
        });
    }, 1500);
}

function updatePlayerStatus(data) {
    const players = data.players || {};
    const answeredPlayers = data.answered_players || [];
    const answersCount = answeredPlayers.length;
    const totalPlayers = Object.keys(players).length;
    
    document.getElementById('answeredCount').textContent = 
        `Ответили: ${answersCount} из ${totalPlayers}`;
    
    const statusDiv = document.getElementById('playersStatus');
    statusDiv.innerHTML = Object.entries(players).map(([id, p]) => {
        const answered = answeredPlayers.includes(id);
        return `
            <div class="player-status-card ${answered ? 'answered' : 'not-answered'}">
                <div class="status-dot ${answered ? 'done' : 'waiting'}"></div>
                <span>${p.name}</span>
            </div>`;
    }).join('');
}

function updateScores(data) {
    const scores = data.scores || {};
    const players = data.players || {};
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('scoresDisplay').innerHTML = sorted
        .map(([id,s],i) => {
            const p = players[id];
            return `<div class="score-card ${i===0?'top':''}">
                <div class="score-name">${medals[i]||'🏅'} ${p?p.name:'Игрок'}</div>
                <div class="score-value">${s}</div></div>`;
        }).join('');
}

function showFinalScreen(data) {
    playWinner();
    clearInterval(currentTimer);
    clearTimeout(autoNextTimer);
    clearInterval(updateInterval);
    
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('finish-screen').classList.remove('hidden');
    
    const scores = data.scores || {};
    const players = data.players || {};
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    
    if (sorted.length > 0) {
        document.getElementById('winnerName').textContent = players[sorted[0][0]]?.name || 'Игрок';
        document.getElementById('winnerScore').textContent = sorted[0][1] + ' очков';
    }
    
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('finalRanking').innerHTML = sorted
        .map(([id,s],i) => {
            const p = players[id];
            return `<div class="ranking-item">
                <span>${medals[i]||'🏅'} ${p?p.name:'Игрок'}</span>
                <span class="ranking-score">${s}</span></div>`;
        }).join('');
}

function resetToMenu() {
    clearInterval(currentTimer);
    clearTimeout(autoNextTimer);
    clearInterval(lobbyInterval);
    clearInterval(updateInterval);
    
    if (roomCode) {
        fetch('/api/reset', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:roomCode})});
    }
    
    document.querySelectorAll('#lobby,#game-screen,#finish-screen').forEach(e => e.classList.add('hidden'));
    document.getElementById('game-select').classList.remove('hidden');
    document.getElementById('createRoomBtn').disabled = true;
    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
    roomCode = null; selectedGame = null;
}
</script>

        <script>
    // ========== ЗВУКИ ==========
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
    function beep(freq, dur, type='sine', vol=0.3) {
        initAudio();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.value = vol;
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function playPlayerJoin() { beep(660, 0.1, 'sine', 0.2); setTimeout(() => beep(880, 0.15, 'sine', 0.2), 100); }
    function playGameStart() { beep(440, 0.15, 'triangle', 0.3); setTimeout(() => beep(554, 0.15, 'triangle', 0.3), 150); setTimeout(() => beep(660, 0.15, 'triangle', 0.3), 300); setTimeout(() => beep(880, 0.4, 'triangle', 0.3), 450); }
    function playCorrect() { beep(523, 0.15, 'sine', 0.3); setTimeout(() => beep(659, 0.15, 'sine', 0.3), 150); setTimeout(() => beep(784, 0.3, 'sine', 0.3), 300); }
    function playWinner() { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => beep(f, 0.3, 'sine', 0.25), i*200)); }
    function playAutoNext() { beep(440, 0.1, 'sine', 0.15); setTimeout(() => beep(440, 0.1, 'sine', 0.15), 200); }
    </script>
