<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 ИГРИЩЕ — ТВ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #a78bfa;
            --bg-mid: #c084fc;
            --bg-end: #f9a8d4;
            --card-bg: rgba(255, 255, 255, 0.55);
            --card-border: rgba(255, 255, 255, 0.5);
            --text: #2d1b69;
            --accent: #7c3aed;
            --accent2: #f472b6;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --shadow: 0 8px 40px rgba(124, 58, 237, 0.2);
            --glow: 0 0 30px rgba(244, 114, 182, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }


        
        body {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%; filter: blur(100px);
            top: -100px; right: -100px;
            animation: float1 10s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 350px; height: 350px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%; filter: blur(80px);
            bottom: -80px; left: -80px;
            animation: float2 12s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-40px, 50px) scale(1.2); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(50px, -30px) scale(1.15); }
        }

        .container { position: relative; z-index: 1; width: 100%; max-width: 950px; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 40px;
            margin: 20px 0;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
            animation: cardIn 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
    font-size: 80px;
    font-weight: 900;
    text-align: center;
    letter-spacing: -2px;
    margin-bottom: 10px;
    /* Градиент только для текста "ИГРИЩЕ", не для содержимого */
}

/* Отдельный класс для градиентного текста */
.logo-gradient {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 4px 12px rgba(124, 58, 237, 0.4));
}

/* Лобби — название игры без градиента */
#lobbyGameName {
    background: none !important;
    -webkit-background-clip: unset !important;
    -webkit-text-fill-color: var(--text) !important;
    background-clip: unset !important;
    color: var(--text);
}

        .subtitle {
            text-align: center;
            opacity: 0.6;
            font-size: 18px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .section-title { text-align: center; font-size: 22px; opacity: 0.7; margin-bottom: 20px; }

        /* Сетка игр */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 18px;
            margin: 30px 0;
        }

        .game-card {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 24px;
            padding: 32px 20px 24px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .game-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(124, 58, 237, 0.25); }
        .game-card.selected {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.08);
            box-shadow: 0 0 0 6px rgba(124, 58, 237, 0.1), var(--glow);
            transform: translateY(-6px);
        }

        .game-icon-wrap {
            width: 80px; height: 80px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 12px;
        }
        .game-icon-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: none !important;
}

.game-icon-emoji {
    font-size: 48px;
    line-height: 1;
    background: none !important;
    -webkit-background-clip: unset !important;
    -webkit-text-fill-color: unset !important;
    background-clip: unset !important;
}
        .game-name { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
        .game-desc { font-size: 14px; opacity: 0.6; }
        .game-badge {
            display: inline-block; margin-top: 12px; padding: 6px 18px;
            background: rgba(124, 58, 237, 0.1); border-radius: 20px;
            font-size: 12px; letter-spacing: 1px;
        }

        /* Код комнаты */
        .room-code {
            display: inline-block;
            font-size: 80px; letter-spacing: 16px; padding: 20px 50px;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5); border-radius: 24px;
            color: var(--text);
            box-shadow: var(--shadow), inset 0 2px 4px rgba(255,255,255,0.8);
            animation: codePulse 3s ease-in-out infinite;
        }
        @keyframes codePulse {
            0%, 100% { box-shadow: var(--shadow), inset 0 2px 4px rgba(255,255,255,0.8); }
            50% { box-shadow: var(--glow), 0 0 40px rgba(244, 114, 182, 0.4), inset 0 2px 4px rgba(255,255,255,0.9); }
        }

        .center { text-align: center; }
        .highlight { color: var(--accent); font-weight: 900; }

        /* Игроки в лобби */
        .players-grid {
            display: flex; flex-wrap: wrap; gap: 14px;
            justify-content: center; margin: 30px 0; min-height: 60px;
        }
        .player-card {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5); border-radius: 18px;
            padding: 14px 22px; font-size: 18px; font-weight: 800;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .player-emoji { font-size: 22px; margin-right: 6px; }

        /* Кнопки */
        .btn {
            display: inline-block; padding: 16px 50px;
            font-family: 'Nunito', sans-serif; font-weight: 900;
            font-size: 22px; letter-spacing: 2px;
            border: none; border-radius: 50px; cursor: pointer;
            color: white; transition: all 0.3s; margin: 8px;
            position: relative; overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #a855f7, var(--accent2));
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.5), inset 0 2px 0 rgba(255,255,255,0.4);
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(124, 58, 237, 0.6); }
        .btn:disabled { background: rgba(255,255,255,0.3); box-shadow: none; cursor: not-allowed; color: rgba(0,0,0,0.2); }
        .btn-secondary {
            background: rgba(255,255,255,0.5); color: var(--text);
            font-size: 16px; padding: 12px 28px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.8); }

        .hidden { display: none !important; }

        /* ====== ИГРОВОЙ ЭКРАН ====== */
        .game-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
}

.game-header-icon {
    width: 42px;
    height: 42px;
    object-fit: contain;
    filter: none !important;  /* ← важно! */
    -webkit-filter: none !important;
}

.game-header-emoji {
    font-size: 36px;
    /* Убираем градиент */
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    background-clip: unset;
}

.game-header-title {
    font-size: 28px;
    font-weight: 900;
    opacity: 0.8;
    /* Градиент ТОЛЬКО для текста названия */
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

        .question-counter { text-align: center; opacity: 0.5; font-size: 16px; margin-bottom: 15px; letter-spacing: 2px; }

        .question-text {
            font-size: 36px; font-weight: 900; margin-bottom: 24px;
            line-height: 1.3; text-align: center; color: var(--text);
        }

        .answers-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 14px; max-width: 650px; margin: 0 auto;
        }
        .answer-display {
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px);
            padding: 22px 18px; border-radius: 20px; font-size: 20px;
            font-weight: 800; border: 2px solid rgba(255,255,255,0.5);
            text-align: center; color: var(--text);
        }

        .timer {
            font-size: 64px; font-weight: 900; text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 20px 0;
            transition: all 0.3s;
        }
        .timer.warning {
            background: linear-gradient(135deg, var(--red), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerBlink 0.5s infinite;
        }
        .timer.auto-next {
            background: linear-gradient(135deg, var(--green), #4ade80);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: timerBlink 0.3s infinite;
        }
        @keyframes timerBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.08); }
        }

        /* Статус игроков */
        .players-status {
            display: flex; flex-wrap: wrap; gap: 12px;
            justify-content: center; margin: 20px 0;
        }
        .player-status-card {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 16px; padding: 12px 20px;
            font-size: 18px; font-weight: 800;
            transition: all 0.4s;
        }
        .player-status-card.answered {
            border-color: var(--green);
            background: rgba(34, 197, 94, 0.1);
        }
        .player-status-card.not-answered {
            border-color: var(--orange);
            background: rgba(245, 158, 11, 0.05);
        }
        .status-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .status-dot.done { background: var(--green); box-shadow: 0 0 12px rgba(34,197,94,0.5); }
        .status-dot.waiting { background: var(--orange); animation: dotPulse 1s infinite; }
        @keyframes dotPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .answered-count { font-size: 14px; opacity: 0.6; text-align: center; margin-top: 8px; }

        /* Счёт */
        .scores-list {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin: 20px 0;
        }
        .score-card {
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            padding: 12px 22px; border-radius: 16px;
            text-align: center; font-weight: 800;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .score-card.top { background: rgba(124, 58, 237, 0.12); border-color: rgba(124, 58, 237, 0.3); }
        .score-name { font-size: 13px; opacity: 0.6; margin-bottom: 4px; }
        .score-value { font-size: 28px; color: var(--accent); }

        /* Финал */
        .winner-crown { font-size: 72px; display: block; margin-bottom: 10px; }
        .winner-name {
            font-size: 44px; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .winner-score { font-size: 52px; font-weight: 900; color: var(--accent); }
        .ranking-item {
            display: flex; justify-content: space-between;
            padding: 14px 22px; background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px); border-radius: 14px;
            margin: 8px 0; font-weight: 800; font-size: 18px;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .ranking-score { color: var(--accent); font-weight: 900; }
        .empty-state { text-align: center; opacity: 0.4; padding: 24px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- ВЫБОР ИГРЫ -->
        <div id="game-select" class="glass-card">
            <div class="logo logo-gradient">ИГРИЩЕ</div>
            <div class="subtitle">игра для компании</div>
            <div class="section-title">Выбери игру:</div>
            <div class="games-grid" id="gamesList"><div class="empty-state">Загрузка игр...</div></div>
            <div class="center" style="margin-top:24px;">
                <button class="btn btn-primary" id="createRoomBtn" disabled onclick="createRoom()">🚀 СОЗДАТЬ КОМНАТУ</button>
            </div>
        </div>
        
        <!-- ЛОББИ -->
        <div id="lobby" class="glass-card hidden">
            <div class="logo" style="font-size:36px;" id="lobbyGameName"></div>
            <div class="center" style="margin:30px 0;">
                <div class="room-code" id="roomCode">----</div>
                <p style="font-size:22px;margin-top:20px;opacity:0.7;">
                    Заходи на <span class="highlight" id="serverUrl">...</span>
                </p>
            </div>
            <div class="players-grid" id="playersList"><div class="empty-state">Ожидаем игроков...</div></div>
            <div class="center" style="margin-top:30px;">
                <button class="btn btn-primary" id="startBtn" disabled onclick="startGame()">🎮 НАЧАТЬ ИГРУ</button>
                <br><button class="btn btn-secondary" onclick="resetToMenu()">← Выбрать другую игру</button>
            </div>
        </div>
        
        <!-- ИГРА -->
<div id="game-screen" class="glass-card hidden">
    <!-- Заголовок с иконкой -->
    <div class="game-header">
        <img class="game-header-icon" id="gameIconImg" src="" alt="" style="display:none;">
        <span class="game-header-emoji" id="gameIconEmoji"></span>
        <span class="game-header-title" id="gameTitle"></span>
    </div>
    
    <!-- ====== КВИЗ ====== -->
    <div id="quiz-area" class="hidden">
        <div class="question-counter" id="questionCounter"></div>
        <div class="question-text" id="questionText"></div>
        <div class="timer" id="timer"></div>
        <div class="answers-grid" id="answersDisplay"></div>
        <div class="answered-count" id="answeredCount"></div>
        <div class="players-status" id="playersStatus"></div>
        <div class="scores-list" id="scoresDisplay"></div>
    </div>
    
    <!-- ====== ПРАВДА/ДЕЙСТВИЕ ====== -->
    <div id="truthdare-area" class="hidden">
        <!-- Экран голосования -->
        <div id="voting-screen">
            <div style="text-align:center;font-size:28px;margin:20px 0;">
                🎯 Выбран: <span id="currentPlayerName" style="color:var(--accent);font-weight:900;"></span>
            </div>
            <div style="text-align:center;font-size:22px;opacity:0.7;margin-bottom:30px;">
                Голосуйте: Правда или Действие?
            </div>
            <div style="display:flex;gap:20px;justify-content:center;">
                <div style="background:rgba(255,255,255,0.6);padding:30px 40px;border-radius:20px;text-align:center;font-size:24px;font-weight:900;">
                    🗣 Правда<br><span id="truthVotes" style="font-size:48px;color:var(--accent);">0</span>
                </div>
                <div style="background:rgba(255,255,255,0.6);padding:30px 40px;border-radius:20px;text-align:center;font-size:24px;font-weight:900;">
                    💥 Действие<br><span id="dareVotes" style="font-size:48px;color:var(--accent2);">0</span>
                </div>
            </div>
        </div>
        
        <!-- Экран задания -->
        <div id="task-screen" class="hidden">
            <div style="text-align:center;font-size:28px;margin:20px 0;">
                <span id="taskPlayerName"></span>, твоё задание:
            </div>
            <div style="text-align:center;font-size:36px;font-weight:900;margin:30px 0;padding:30px;background:rgba(255,255,255,0.6);border-radius:20px;" id="taskText"></div>
            <div style="text-align:center;font-size:20px;opacity:0.6;">Ожидаем выполнения...</div>
            <div class="players-status" id="tdPlayersStatus"></div>
        </div>
        
        <div class="scores-list" id="tdScoresDisplay"></div>
    </div>
</div>
        
        <!-- ФИНАЛ -->
        <div id="finish-screen" class="glass-card hidden">
            <div class="logo" style="font-size:36px;">ИГРА ОКОНЧЕНА!</div>
            <div class="center" style="margin:30px 0;">
                <span class="winner-crown">👑</span>
                <div class="winner-name" id="winnerName"></div>
                <div class="winner-score" id="winnerScore"></div>
            </div>
            <div id="finalRanking" style="max-width:450px;margin:0 auto;"></div>
            <div class="center" style="margin-top:30px;">
                <button class="btn btn-primary" onclick="resetToMenu()">🔄 ИГРАТЬ ЕЩЁ</button>
            </div>
        </div>
        
    </div>

<script>
let selectedGame = null;
let roomCode = null;
let currentTimer = null;
let autoNextTimer = null;
let lobbyInterval = null;
let updateInterval = null;
let lastAnswerCount = 0;
let lastPlayerCount = 0;
let autoNextLocked = false;


// ========== ЗАГРУЗКА ИГР ==========
fetch('/api/games')
    .then(r => r.json())
    .then(games => {
        const grid = document.getElementById('gamesList');
        grid.innerHTML = Object.entries(games).map(([id, game]) => {
            const hasImage = game.icon_image && game.icon_image.trim() !== '';
            const iconHTML = hasImage 
                ? `<img src="${game.icon_image}" class="game-icon-img" alt="">`
                : `<span class="game-icon-emoji">${game.icon || '🎮'}</span>`;
            return `<div class="game-card" data-game="${id}" onclick="selectGame('${id}')">
                <div class="game-icon-wrap">${iconHTML}</div>
                <div class="game-name" style="color:${game.color}">${game.name}</div>
                <div class="game-desc">${game.description}</div>
                <div class="game-badge">${game.questions_count} вопросов</div></div>`;
        }).join('');
    });

function selectGame(id) {
    selectedGame = id;
    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`[data-game="${id}"]`).classList.add('selected');
    document.getElementById('createRoomBtn').disabled = false;
}

function createRoom() {
    if (!selectedGame) return;
    fetch(`/api/create?game=${selectedGame}`).then(r => r.json()).then(data => {
        roomCode = data.code;
        document.getElementById('game-select').classList.add('hidden');
        document.getElementById('lobby').classList.remove('hidden');
        document.getElementById('lobbyGameName').textContent = data.game.name;
        document.getElementById('roomCode').textContent = roomCode;
        document.getElementById('serverUrl').textContent = window.location.host + '/player';
        preloadLobbyMusic();
        playLobbyMusic();
        lastPlayerCount = 0;
        updateLobby();
        lobbyInterval = setInterval(updateLobby, 2000);
    });
}

function updateLobby() {
    if (!roomCode) return;
    fetch('/api/state/' + roomCode).then(r => r.json()).then(data => {
        if (data.error) return;
        const players = data.players || {};
        const count = Object.keys(players).length;
        if (count > lastPlayerCount && lastPlayerCount > 0) playPlayerJoin();
        lastPlayerCount = count;
        const emojis = ['🦊','🐼','🐨','🦁','🐸','🦄','🐙','🦋'];
        document.getElementById('playersList').innerHTML = count === 0 
            ? '<div class="empty-state">Ожидаем игроков...</div>'
            : Object.entries(players).map(([id,p],i) => `<div class="player-card"><span class="player-emoji">${emojis[i%8]}</span>${p.name}</div>`).join('');
        document.getElementById('startBtn').disabled = count === 0;
        if (data.state === 'playing') { clearInterval(lobbyInterval); showGameScreen(data); }
    });
}

function startGame() {
    playGameStart();
    fetch('/api/start', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:roomCode})});
}

function showGameScreen(data) {
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    if (data.game_icon_image) {
        document.getElementById('gameIconImg').src = data.game_icon_image;
        document.getElementById('gameIconImg').style.display = 'inline-block';
        document.getElementById('gameIconEmoji').style.display = 'none';
    } else {
        document.getElementById('gameIconImg').style.display = 'none';
        document.getElementById('gameIconEmoji').textContent = data.game_icon || '🎮';
        document.getElementById('gameIconEmoji').style.display = 'inline';
    }
    document.getElementById('gameTitle').textContent = data.game_name || '';
    if (data.game_type === 'truth_dare') {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('truthdare-area').classList.remove('hidden');
    } else {
        document.getElementById('truthdare-area').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        showQuestion();
    }
    lastAnswerCount = 0;
    updateInterval = setInterval(updateGameState, 1000);
}


function updateGameState() {
    if (!roomCode) return;
    fetch('/api/state/' + roomCode).then(r => r.json()).then(data => {
        if (data.error) return;
        if (data.state === 'finished') { 
            clearInterval(updateInterval); 
            showFinalScreen(data); 
            return; 
        }
        if (data.game_type === 'truth_dare') {
            updateTruthDareScreen(data);
        } else if (data.game_type === 'quiz') {
            updatePlayerStatus(data);
            updateScores(data);
            const total = Object.keys(data.players || {}).length;
            const answered = data.answers_count || 0;
            
            if (!autoNextLocked && total > 0 && answered > 0 && answered >= total) {
                clearInterval(currentTimer);
                clearTimeout(autoNextTimer);
                autoNext();
            }
        }
    });
}

function updateTruthDareScreen(data) {
    document.getElementById('quiz-area').classList.add('hidden');
    document.getElementById('truthdare-area').classList.remove('hidden');
    document.getElementById('gameTitle').textContent = data.game_name + ' — Раунд ' + (data.round+1) + '/' + data.total_rounds;
    if (data.state === 'voting') {
        document.getElementById('voting-screen').classList.remove('hidden');
        document.getElementById('task-screen').classList.add('hidden');
        document.getElementById('currentPlayerName').textContent = data.current_player_name || '...';
        const v = data.votes || {};
        document.getElementById('truthVotes').textContent = Object.values(v).filter(x=>x==='truth').length;
        document.getElementById('dareVotes').textContent = Object.values(v).filter(x=>x==='dare').length;
    } else if (data.state === 'task' && data.show_task) {
        document.getElementById('voting-screen').classList.add('hidden');
        document.getElementById('task-screen').classList.remove('hidden');
        document.getElementById('taskPlayerName').textContent = data.current_player_name || '';
        document.getElementById('taskText').textContent = (data.task_type==='truth'?'🗣 ПРАВДА: ':'💥 ДЕЙСТВИЕ: ') + data.current_task;
    }
    // Статус игроков Truth/Dare
    const players = data.players || {};
    const votes = data.votes || {};
    document.getElementById('tdPlayersStatus').innerHTML = Object.entries(players).map(([id,p]) => {
        const cur = id === data.current_player_id;
        const vd = votes[id] !== undefined;
        return `<div class="player-status-card ${vd||cur?'answered':'not-answered'}"><div class="status-dot ${vd||cur?'done':'waiting'}"></div><span>${p.name}</span><span style="font-size:12px;opacity:0.6;margin-left:8px;">${cur?'🎯 Выбран':vd?'✅ Проголосовал':'⏳ Думает...'}</span></div>`;
    }).join('');
    // Счёт
    const scores = data.scores || {};
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('tdScoresDisplay').innerHTML = sorted.map(([id,s],i) => `<div class="score-card ${i===0?'top':''}"><div class="score-name">${medals[i]||'🏅'} ${players[id]?.name||'Игрок'}</div><div class="score-value">${s}</div></div>`).join('');
}

function showQuestion() {
    fetch('/api/state/' + roomCode).then(r => r.json()).then(data => {
        if (data.state === 'finished') { showFinalScreen(data); return; }
        const q = data.current_question;
        if (!q) return;
        document.getElementById('questionCounter').textContent = `Вопрос ${data.question_index+1} из ${data.total_questions}`;
        document.getElementById('questionText').textContent = q.text;
        document.getElementById('answersDisplay').innerHTML = q.answers.map(a => `<div class="answer-display">${a}</div>`).join('');
        const timeLeft = data.question_time_left || q.time || 30;
        const timerEl = document.getElementById('timer');
        timerEl.classList.remove('warning','auto-next');
        clearInterval(currentTimer);
        clearTimeout(autoNextTimer);
        let rem = timeLeft;
        timerEl.textContent = '⏱ ' + rem;
        currentTimer = setInterval(() => {
            rem--;
            timerEl.textContent = '⏱ ' + rem;
            if (rem <= 5) timerEl.classList.add('warning');
            if (rem <= 0) { clearInterval(currentTimer); timerEl.textContent = '⏰ 0'; autoNext(); }
        }, 1000);
        autoNextTimer = setTimeout(autoNext, (timeLeft+3)*1000);
        updatePlayerStatus(data);
        updateScores(data);
    });
}

function autoNext() {
    if (autoNextLocked) return;  // ← БЛОКИРОВКА
    autoNextLocked = true;
    
    playAutoNext();
    clearInterval(currentTimer);
    clearTimeout(autoNextTimer);
    lastAnswerCount = 0;
    
    const timerEl = document.getElementById('timer');
    timerEl.textContent = '→ Дальше...';
    timerEl.classList.add('auto-next');
    
    // Ждём 1.5 секунды перед запросом
    setTimeout(() => {
        fetch('/api/next', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:roomCode})})
        .then(() => {
            timerEl.classList.remove('auto-next');
            autoNextLocked = false;  // ← РАЗБЛОКИРОВКА
            showQuestion();
        });
    }, 1500);
}

function updatePlayerStatus(data) {
    const players = data.players || {};
    const answered = data.answered_players || [];
    document.getElementById('answeredCount').textContent = `Ответили: ${answered.length} из ${Object.keys(players).length}`;
    document.getElementById('playersStatus').innerHTML = Object.entries(players).map(([id,p]) => {
        const a = answered.includes(id);
        return `<div class="player-status-card ${a?'answered':'not-answered'}"><div class="status-dot ${a?'done':'waiting'}"></div><span>${p.name}</span></div>`;
    }).join('');
}

function updateScores(data) {
    const scores = data.scores || {};
    const players = data.players || {};
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('scoresDisplay').innerHTML = sorted.map(([id,s],i) => `<div class="score-card ${i===0?'top':''}"><div class="score-name">${medals[i]||'🏅'} ${players[id]?.name||'Игрок'}</div><div class="score-value">${s}</div></div>`).join('');
}

function showFinalScreen(data) {
    playWinner();
    clearInterval(currentTimer);
    clearTimeout(autoNextTimer);
    clearInterval(updateInterval);
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('finish-screen').classList.remove('hidden');
    const scores = data.scores || {};
    const players = data.players || {};
    const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
    if (sorted.length > 0) {
        document.getElementById('winnerName').textContent = players[sorted[0][0]]?.name || 'Игрок';
        document.getElementById('winnerScore').textContent = sorted[0][1] + ' очков';
    }
    const medals = ['🥇','🥈','🥉'];
    document.getElementById('finalRanking').innerHTML = sorted.map(([id,s],i) => `<div class="ranking-item"><span>${medals[i]||'🏅'} ${players[id]?.name||'Игрок'}</span><span class="ranking-score">${s}</span></div>`).join('');
}

function resetToMenu() {
    stopLobbyMusic();
    clearInterval(currentTimer);
    clearTimeout(autoNextTimer);
    clearInterval(lobbyInterval);
    clearInterval(updateInterval);
    if (roomCode) fetch('/api/reset', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code:roomCode})});
    document.querySelectorAll('#lobby,#game-screen,#finish-screen').forEach(e => e.classList.add('hidden'));
    document.getElementById('game-select').classList.remove('hidden');
    document.getElementById('createRoomBtn').disabled = true;
    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('selected'));
    roomCode = null; selectedGame = null;
}
</script>

<script>
// ========== ЗВУКИ ==========
let lobbyAudioCtx = null, lobbySource = null, lobbyBuffer = null, lobbyGain = null, winnerPlayed = false;

async function preloadLobbyMusic() {
    try {
        if (!lobbyAudioCtx) lobbyAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
        if (!lobbyBuffer) {
            const r = await fetch('/static/sounds/fon.mp3');
            lobbyBuffer = await lobbyAudioCtx.decodeAudioData(await r.arrayBuffer());
        }
    } catch(e) {}
}

function playLobbyMusic() {
    if (!lobbyBuffer) { preloadLobbyMusic().then(() => playLooped()); return; }
    playLooped();
}

function playLooped() {
    if (!lobbyBuffer || !lobbyAudioCtx) return;
    stopLobbyMusic();
    lobbySource = lobbyAudioCtx.createBufferSource();
    lobbySource.buffer = lobbyBuffer;
    lobbySource.loop = true;
    lobbySource.loopStart = 0.05;
    lobbySource.loopEnd = lobbyBuffer.duration - 0.05;
    lobbyGain = lobbyAudioCtx.createGain();
    lobbyGain.gain.value = 0.3;
    lobbySource.connect(lobbyGain);
    lobbyGain.connect(lobbyAudioCtx.destination);
    lobbySource.start(0);
}


function stopLobbyMusic() { if (lobbySource) { try { lobbySource.stop(0); } catch(e) {} lobbySource = null; } }
function playSound(n, v=0.5) { try { const a = new Audio('/static/sounds/'+n+'.mp3'); a.volume=v; a.play().catch(()=>{}); } catch(e) {} }
function playPlayerJoin() { playSound('connection', 0.4); }
function playCorrect() { playSound('approve', 0.5); }
function playAutoNext() { playSound('vibor', 0.6); }
function playWinner() { if (!winnerPlayed) { winnerPlayed = true; playSound('winner', 0.7); } }
function playGameStart() { stopLobbyMusic(); winnerPlayed = false; playSound('fon', 0.6); }


</script>
